    <script>
        const files = {"files":[{"name":"puppy交友文案_2026-06-24.md","dir":"龙虾小红书","content":"# 🐾 那个被叫做puppy的人 其实早就找到了家\n\n---\n\n有没有一种关系\n是你不用逞强\n可以光明正大地黏人\n可以在他面前当个小笨蛋\n而他只觉得你可爱 🥺\n\n不瞒你们说\n我一直觉得世界上最好的关系就是——\n你愿意宠，我愿意赖\n\n早安是\"小狗醒了吗\"\n晚安是\"乖 不闹了 早点睡\"\n生气了会被拎回来哄\n撒娇了会被摸摸头\n每次叫你puppy的时候\n你尾巴都要翘起来了吧 🐕\n\n这就是我想找的那种相处呀\n不是谁比谁厉害\n是你在外面是世界\n在我面前是只大大的puppy\n反过来我也可以是你的\n互相照顾 互相宠着\n谁先认怂谁赢 🫶\n\n最近在Puppy上遇到好多同频的人\n聊着聊着就笑了\n隔着屏幕都能感觉到那种——\n\"嗯 就是这个人了\"的感觉\n\n所以今天想跟所有还没找到专属关系的puppy说\n别急 真的不用急\n你值得一个\n把你当全世界的人 🌍\n\n你是什么样的小puppy呢？\n爱撒娇型的？护主型的？还是表面高冷内心软塌塌的？\n评论区聊聊 看看有没有同类 🐶💕\n\n---\n\n#DDLG #puppy #恋爱日常 #被宠着的感觉 #找到对的人 #甜甜的恋爱 #恋爱日记 #黏人小狗 #恋爱关系 #satisfying","mtime":"2026-06-24T01:04:49.126Z"},{"name":"puppy交友文案_2026-06-23.md","dir":"龙虾小红书","content":"# 社恐福音！这个交友APP让我不再害怕和陌生人说话了 😭✨\n\n---\n\n## 正文\n\n姐妹们！我要来安利一个我最近超爱的交友平台——Puppy！🐶\n\n说实话，作为一个重度社恐+内向人格，我以前真的超怕主动搭话的。每次想认识新朋友，打开别的社交软件，那种\"我该说什么\"\"我会不会打扰到对方\"的焦虑感直接拉满...😅\n\n但是！Puppy真的改变了我的交友体验！\n\n**为什么我爱死Puppy了：**\n\n✅ **真实交友，拒绝照骗**\n平台有超严格的真人认证，再也不用担心遇到假照骗子啦～大家都是真实的样子，反而更放松！\n\n✅ **兴趣匹配超精准**\n系统会根据你的爱好、性格、生活方式智能推荐，我匹配到的都是真的和我聊得来的人！从动漫到健身，从美食到旅行，总有共同话题～\n\n✅ **轻松氛围，零压力**\n没有那种\"必须马上确定关系\"的紧迫感，就是单纯地认识有趣的人、聊开心的事，慢慢了解，自然亲近～这种节奏我太爱了！💕\n\n✅ **安全私密，放心交友**\n隐私保护做得超好，可以自主控制个人信息展示，遇到不舒服的情况一键举报，平台处理超快！\n\n**我的使用感受：**\n用了Puppy两个月，认识了三个线下一起喝咖啡的朋友，还有一个每周一起打游戏的小伙伴～完全没有以前那种\"网上聊得嗨，见面尴尬死\"的情况，大家都很真实很nice！🌈\n\n如果你也想认识新朋友，又害怕传统社交软件的尴尬，真的可以试试Puppy！\n\n📱 搜索\"Puppy交友\"就能下载啦～\n\n相信我，你也会爱上这种轻松交朋友的感觉的！✨\n\n---\n\n## 标签\n#Puppy交友 #社交APP推荐 #真实交友 #社恐福音 #认识新朋友 #交友平台 #轻松社交 #真诚交友 #年轻人的社交方式 #交友神器\n\n---\n\n生成时间：2026-06-23 09:00\n生成者：小红（小红书资深玩家）\n","mtime":"2026-06-23T01:01:30.958Z"},{"name":"文案10_神秘钓系路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 神秘钓系路线\n\n**标题：**  能让我听话的Daddy，你在哪？🖤\n\n**正文：**\n表面：独立、利落、自己的生活井井有条。\n背面：其实一直在等一个能让我安心交出遥控器的人。\n\nDaddy不是谁都配叫的。\n需要情绪稳定、边界清晰、会管也会宠。\n我不会随便低头，\n但遇到对的人，我可以很乖。\n\nDDLG不是童话，是双向奔赴。\n你愿意管，我愿意听，才算。\n\n💬 评论区：你觉得什么样的人才有资格叫Daddy？\n\n**话题：** #DDLG #puppy #daddy #神秘小狗 #等人认领 #兴趣交友 #成年人社交 #双向奔赴 #懂得都懂\n","mtime":"2026-06-22T01:23:27.681Z"},{"name":"文案9_日常感路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 日常感路线\n\n**标题：**  DDLG不是剧本，是我们认真过的日常🐕‍🦺\n\n**正文：**\n早上：Daddy发消息\"今天降温，穿厚点☀️\"\n中午：\"午饭发我看看，别糊弄\"\n晚上：\"今天表现可以，奖励你说晚安前可以多玩10分钟\"\n\n没有滤镜，没有剧本。\nDDLG就是有人愿意在细节里把你放在心上，\n而你也愿意让TA知道，你在乎每一句关心。\n\npuppy的快乐很简单：被记着、被管着、被夸着。\n\n💬 评论区：你理想中的日常是什么样的？\n\n**话题：** #DDLG #puppy #daddy #理想日常 #被放在心上 #治愈系日常生活 #细节里的爱 #情绪价值\n","mtime":"2026-06-22T01:23:22.045Z"},{"name":"文案8_甜欲路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 甜欲路线（轻）\n\n**标题：**  想做你的puppy，只想被你一个人管🍬\n\n**正文：**\n不是所有人都配让我低头。\n只有那个让我心甘情愿喊Daddy的人，\n才有资格管我几点睡、吃什么、穿什么。\n\nDDLG关系最甜的地方就在这——\n我把选择权交给你，是因为我知道你会好好接住。\n奖励是一个吻，惩罚是一句\"下次注意\"，\n分寸之间全是默契和信任。\n\n⚠️ 仅限成年人、仅限平等自愿、仅限互相尊重。\n\n💬 评论区：一段DDLG关系里，你更看重管束还是宠爱？\n\n**话题：** #DDLG #puppy #daddy #甜蜜暴击 #成年人社交 #信任关系 #小狗文学 #专属宠爱\n","mtime":"2026-06-22T01:23:16.762Z"},{"name":"文案7_真实真诚路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 真实真诚路线\n\n**标题：**  认真聊一下DDLG——这不是你想的那种关系\n\n**正文：**\n很多人听到DDLG就觉得是奇奇怪怪的东西，其实它是一种建立在信任之上的成年人关系模式。\nDaddy是引导者、照顾者，puppy是被照顾者、被引导者。\n本质是：一方愿意托底，一方愿意交付。\n\n关键不是角色，是你们的沟通、边界和尊重。\n好DDLG关系里，双方一定是平等自愿的。\n不约、不钓鱼、不扶贫。\n\n如果你懂我在说什么，欢迎评论区聊聊你的理解。\n\n💬 评论区：你觉得一段健康的DDLG关系应该具备什么？\n\n**话题：** #DDLG #puppy #daddy #真诚交友 #兴趣社交 #边界感 #情绪稳定 #成年人关系 #正确认知\n","mtime":"2026-06-22T01:23:11.432Z"},{"name":"文案6_傲娇型路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 傲娇型路线\n\n**标题：**  反正我也没有很想被管，就是刚好你管得我喜欢😌\n\n**正文：**\n\"我自己也能过得好好的谢谢。\"\n\"但是如果你提醒我早睡、催我吃饭、问我今天开心吗……\"\n\"……那也行。\"\n\n嘴上说不需要，心里已经开始摇尾巴。\nDDLG关系里最妙的就是这种默契——\n我知道你会管，你知道我心里是愿意的。\n\n理想型：有分寸、有耐心、会引导的Daddy型。\n\n💬 评论区：你也是嘴硬心软型选手吗？\n\n**话题：** #DDLG #puppy #daddy #傲娇小狗 #嘴硬心软 #成年人社交 #驯服与被驯服 #默契关系\n","mtime":"2026-06-22T01:23:05.969Z"},{"name":"文案5_氛围感路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 氛围感路线\n\n**标题：**  想要那种被他轻轻揉头发说\"乖\"的感觉✨\n\n**正文：**\nDDLG最迷人的地方，不是角色本身，是那种氛围——\n有人愿意接纳你的全部，包括你不成熟的那一面。\n你可以放下防备，卸下伪装，\n在他面前做最真实的自己。\n\nDaddy不是标签，是一种能让你安心的气场。\npuppy不是宠物，是愿意把柔软的一面交给对方的人。\n\n🌙 慢热型，蹲一个同样懂得慢慢经营的人。\n\n💬 评论区：你觉得DDLG关系里最动心的瞬间是什么？\n\n**话题：** #DDLG #puppy #daddy #氛围感 #慢热 #温柔社交 #成年人情感 #情绪价值 #灵魂伴侣\n","mtime":"2026-06-22T01:23:00.395Z"},{"name":"文案4_幽默吐槽路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 幽默吐槽路线\n\n**标题：**  一个合格的puppy，既要会撒娇也要会自己吃饭🙃\n\n**正文：**\n别以为DDLG就是光躺着被喂饭！\n有时候Daddy自己加班到半夜，我还得反过来催他睡觉。\n但是！只要他一句\"今天表现真好\"，\n我又可以再乖三天 🐶\n\n所以Daddy请备好：耐心、温柔、偶尔凶一下，\n以及接受你的puppy也会有反骨的事实。\n\n🔔 免责声明：成年人之间的默契关系，平等自愿，互宠互管。\n\n💬 评论区：你觉得自己在关系里是乖宝宝还是反骨仔？\n\n**话题：** #DDLG #puppy #daddy #搞笑日常 #反差萌 #成年人社交 #养成的快乐 #互宠关系\n","mtime":"2026-06-22T01:22:55.570Z"},{"name":"文案3_温柔治愈路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 温柔治愈路线\n\n**标题：**  Daddy的一句\"乖，我来就行\"，我能记三天💗\n\n**正文：**\n不需要轰轰烈烈，DDLG关系里最打动我的，就是那些被接住的瞬间。\n撒娇的时候有人接，委屈的时候有人哄，\n犯了小错会被说\"下次注意\"，而不是被骂。\n被宠不是因为你做不到，而是有人愿意替你扛。\n\n这样的关系里，puppy学会的不是依赖，是信任。\n\n💬 评论区：哪句话会让你瞬间觉得被治愈了？\n\n**话题：** #DDLG #puppy #daddy #治愈系 #安全感 #被宠爱的日常 #温柔一刀 #成年人关系\n","mtime":"2026-06-22T01:22:49.670Z"},{"name":"文案2_直球型路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 直球型路线\n\n**标题：**  蹲一个会给我立规矩也会给我扎小辫的Daddy👀\n\n**正文：**\n不是找爹，是找一种让人安心把主导权交出去的关系。\n懂DDLG的应该知道我在说什么：\n要的是被管束的踏实感，被惦记的小温暖，\n做对了有奖励，做错了有指导。\n这种默契，比什么都珍贵。\n\n如果你情绪稳定、有分寸、会引导，\n那我愿意做那个愿意听你话的puppy。\n\n⚠️ 雷区：未成年勿扰、控制欲过头勿扰、不尊重边界勿扰。\n\n💬 评论区：你觉得理想的DDLG关系里最重要的是什么？\n\n**话题：** #DDLG #puppy #daddy #直球交友 #情绪价值 #边界感 #成年人社交 #寻找同频人\n","mtime":"2026-06-22T01:22:44.669Z"},{"name":"文案1_反差萌路线.md","dir":"交友文案","content":"# DDLG · 小红书交友文案 · 反差萌路线\n\n**标题：**  白天独立女性，晚上只想被Daddy管着，这不冲突吧？🐾\n\n**正文：**\n外面风风火火，什么都能自己搞定。\n但回到家，就只想缩成一小团，被人摸摸头、安排好吃喝。\n不是不会自己来，只是在他面前，可以放心把脑子丢掉。\n\n这就是我们常说的DDLG——一种成年人之间的照顾与被照顾。\n不是不成熟，是心甘情愿的依赖和信任。\n\n📌 划重点：成年人之间，真诚自愿，平等有边界。\n\n💬 评论区：你们在外面和在家里的状态一样吗？\n\n**话题：** #DDLG #puppy #daddy #反差萌 #成年人关系 #照顾与被照顾 #氛围感 #小狗文学 #情绪价值\n","mtime":"2026-06-22T01:22:38.407Z"},{"name":"找搭子指南_v2.0.pdf","dir":"找搭子步骤","content":"\n\n找搭子行动指南 v2.0\n—— 找搭子别犬慷，动起来才能找到搭子！ ——\n【 第一步 】 获取文案\n●每天群里会统一推送当日交友文案，直接复制使用，省去编写的麻烦。\n【 第二步 】 发布到平台\n●将文案发布到 小红书 / 微博 / 抖音 （任选一个或多个），发布后记得适当养号，提高曝光度。\n【 第三步 】 与女生正确聊天方式\n\u0000 正确做法\n●不要一上来就 要照片 / 发照片\n●先聊兴趣、聊日常，用人格魅力吸引对方\n\u0000 常见错误\n●“发张照片看看唉” / “你长什么样” —— 绝对不要这样问！\n\u0000 保持真诚，互相尊重\n●说话有礼谨，不开过分的欺笑\n●不要油腔滑调，真诚永远是最重要的\n●对方不想回答的问题，不要追问\n\u0000 渐进忙渐了解\n●先从共同爱好入手，找到话题\n●聊彻此的城市、工作、生活习惯\n●了解对方的三观和性格，这比外表重要得多\n群号 1103047119\n\n【 第三步 】 与女生正确聊天方式 （继续）\n\u0000 见面之前，禁止聊这些话题：\n●不要问身高体重三围\n●不要聊敏感 / 播边话题\n●不要发奇怪的表情包或链接\n●不要怪于见面或要联系方式\n\u0000 什么时候可以见面？\n●双方聊了一段时间，感觉彻此合适、互相有好感\n●且双方都有见面意愿，再考虑线下见面\n【 第四步 】 保持活跃\n●每天坚持发布文案，有人评论或私信及时回复，不要冷场。\n★ 本群交友规范\n真诚友善 \u0000  |  互相尊重 \u0000  |  拒绝骇扰 \u0000  |  拒绝快餐式社交 \u0000\n每日群内提供标准交友文案，直接复制使用\n推荐先聊关注，清楚内容再进行深度交流\n—— 慢慢来，才有好故事 ——\n群号：1103047119\n群号 1103047119","mtime":"2026-06-21T12:16:16.840Z"}],"folders":["交友文案","圈内资料","找搭子步骤","龙虾小红书"]};

                    function renderFileList() {
            const listView = document.getElementById('listView');
            listView.innerHTML = '';
            
            // 从 filesJson 获取所有文件夹列表
            const allFolders = files.folders || [];
            
            // 构建文件夹树（按 dir 字段分组）
            const folders = {};
            files.files.forEach(file => {
                const dir = file.dir || '';
                if (!folders[dir]) folders[dir] = [];
                folders[dir].push(file);
            });
            
            // 显示所有一级子文件夹
            allFolders.forEach(folderName => {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder-group';
                
                const header = document.createElement('div');
                header.className = 'folder-header';
                const fileCount = (folders[folderName] || []).length;
                header.innerHTML = '<span class="folder-icon">📁</span>' + 
                    folderName + ' <span class="folder-count">(' + fileCount + ')</span>' + 
                    '<span class="folder-arrow">▼</span>';
                
                const body = document.createElement('div');
                body.className = 'folder-body';
                body.style.display = 'none';
                
                header.onclick = () => {
                    const isOpen = body.style.display !== 'none';
                    body.style.display = isOpen ? 'none' : 'block';
                    header.querySelector('.folder-arrow').textContent = isOpen ? '▼' : '▲';
                };
                
                // 该文件夹下的文件按修改时间排序
                const folderFiles = folders[folderName] || [];
                folderFiles.sort((a, b) => new Date(b.mtime) - new Date(a.mtime));
                folderFiles.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item folder-file';
                    item.onclick = (ev) => { ev.stopPropagation(); openFile(file); };
                    
                    const name = document.createElement('div');
                    name.className = 'file-name';
                    name.textContent = file.name.replace(/.(md|pdf|doc|docx|xls|xlsx|ppt|pptx)$/, '');
                    
                    const meta = document.createElement('div');
                    meta.className = 'file-meta';
                    meta.textContent = new Date(file.mtime).toLocaleString('zh-CN');
                    
                    item.appendChild(name);
                    item.appendChild(meta);
                    body.appendChild(item);
                });
                
                folderDiv.appendChild(header);
                folderDiv.appendChild(body);
                listView.appendChild(folderDiv);
            });
        }
            
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'list' && i === 0) || (tab === 'content' && i === 1));
            });
            document.getElementById('listView').classList.toggle('active', tab === 'list');
            document.getElementById('contentView').classList.toggle('active', tab === 'content');
        }
        
        function openFile(file) {
            currentFile = file;
            const contentEl = document.getElementById('contentText');
            contentEl.innerHTML = mdToHtml(file.content);
            switchTab('content');
        }
        
        function mdToHtml(md) {
            return md
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^\*]+)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/^- (.*$)/gm, '<li>$1</li>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        }
        
        function openXhs() {
            showToast('请在小红书 APP 中搜索相关内容');
        }
        
        function copyContent() {
            if (!currentFile) {
                showToast('请先选择一个文件');
                return;
            }
            const text = currentFile.content;
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制到剪贴板');
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ 已复制到剪贴板');
            });
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function generateHeaderBackground() {
            const canvas = document.getElementById('headerCanvas');
            const header = canvas.parentElement;
            canvas.width = header.offsetWidth;
            canvas.height = header.offsetHeight;
            
            const ctx = canvas.getContext('2d');
            
            // 深色渐变背景
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#1a0a0a');
            gradient.addColorStop(0.5, '#0a0a0a');
            gradient.addColorStop(1, '#1a0a0a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制红色光晕
            const drawGlow = function(x, y, radius, color) {
                const glow = ctx.createRadialGradient(x, y, 0, x, y, radius);
                glow.addColorStop(0, color);
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
            };
            
            drawGlow(canvas.width * 0.2, canvas.height * 0.5, 150, 'rgba(255, 36, 66, 0.15)');
            drawGlow(canvas.width * 0.8, canvas.height * 0.5, 120, 'rgba(255, 107, 138, 0.1)');
            
            // 绘制萤火虫效果（小圆点）
            for (let i = 0; i < 30; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 2 + 0.5;
                const opacity = Math.random() * 0.3 + 0.1;
                
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 107, 138, ' + opacity + ')';
                ctx.fill();
            }
            
            // 绘制流动线条
            ctx.strokeStyle = 'rgba(255, 36, 66, 0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                const startY = Math.random() * canvas.height;
                ctx.moveTo(0, startY);
                for (let x = 0; x < canvas.width; x += 50) {
                    ctx.quadraticCurveTo(
                        x, startY + Math.sin(x * 0.02 + i) * 20,
                        x + 25, startY + Math.sin((x + 25) * 0.02 + i) * 20
                    );
                }
                ctx.stroke();
            }
        }
        
        // 页面加载后生成背景
        window.addEventListener('load', generateHeaderBackground);
        window.addEventListener('resize', generateHeaderBackground);
        
        renderFileList();
    </script>
</body>
</html>
